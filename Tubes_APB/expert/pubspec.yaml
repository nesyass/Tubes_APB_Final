name: expert
description: "Surindo Printing - Maps & Navigation Feature"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database & Utils
  sqflite: ^2.3.0
  path: ^1.8.0
  file_picker: ^8.0.0
  uuid: ^4.2.0

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

  # Maps & lokasi
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0

  cupertino_icons: ^1.0.6
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.2
  supabase_flutter: ^2.14.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
